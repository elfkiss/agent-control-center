<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 控制中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-input: #0d1117;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --primary-hover: #79b8ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --accent: #a371f7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: grid;
            grid-template-columns: 260px 1fr 320px;
            height: 100vh;
        }
        
        /* 左侧栏 */
        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .search-box {
            margin-top: 12px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .agent-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }
        
        .agent-item:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        
        .agent-item.active {
            background: rgba(88, 166, 255, 0.15);
            border: 1px solid var(--primary);
        }
        
        .agent-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .agent-info {
            flex: 1;
            min-width: 0;
        }
        
        .agent-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .agent-status {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }
        
        /* 中间区域 */
        .main {
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }
        
        .main-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-title {
            font-size: 14px;
            font-weight: 600;
        }
        
        .chat-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .btn:hover {
            background: var(--bg-input);
            border-color: var(--text-muted);
        }
        
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--success));
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--bg-card);
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .message.user .message-content {
            background: var(--primary);
            color: #fff;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 150px;
        }
        
        .input-wrapper textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--primary);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.15s;
        }
        
        .send-btn:hover {
            background: var(--primary-hover);
        }
        
        /* 右侧栏 */
        .config-panel {
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
        }
        
        .config-section {
            margin-bottom: 24px;
        }
        
        .config-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .config-item {
            margin-bottom: 12px;
        }
        
        .config-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .config-select, .config-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }
        
        .config-select:focus, .config-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .tools-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tool-tag {
            padding: 4px 10px;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 20px;
            font-size: 11px;
            color: var(--primary);
        }
        
        .prompt-area textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
        }
        
        .prompt-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .stat-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
        }
        
        /* API设置弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 连接状态 */
        .connection-status {
            position: fixed;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
        }
        
        .connection-status.connected {
            background: rgba(63, 185, 80, 0.2);
            color: var(--success);
        }
        
        .connection-status.disconnected {
            background: rgba(248, 81, 73, 0.2);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="connection-status disconnected" id="connectionStatus">
        <span class="status-dot"></span>
        <span>未连接</span>
    </div>
    
    <div class="app">
        <!-- 左侧栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <span>AI Control</span>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="搜索 Agent..." id="searchInput">
                </div>
            </div>
            <div class="agent-list" id="agentList">
                <!-- Agent列表 -->
            </div>
        </div>
        
        <!-- 中间区域 -->
        <div class="main">
            <div class="main-header">
                <div class="chat-title" id="chatTitle">🤖 AI Assistant</div>
                <div class="chat-actions">
                    <button class="btn" id="clearBtn">🗑️ 清空</button>
                    <button class="btn" id="settingsBtn">⚙️ 设置</button>
                </div>
            </div>
            <div class="messages" id="messages">
                <div class="message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">你好！我是 AI 助手。请问有什么可以帮助你的？</div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
        
        <!-- 右侧栏 -->
        <div class="config-panel">
            <div class="config-section">
                <div class="config-title">模型</div>
                <div class="config-item">
                    <div class="config-label">选择模型</div>
                    <select class="config-select" id="modelSelect">
                        <option value="custom/minimax-m2.5">minimax-m2.5</option>
                        <option value="custom/glm-5">glm-5</option>
                        <option value="qwen3.5:9b">qwen3.5:9b</option>
                    </select>
                </div>
            </div>
            
            <div class="config-section">
                <div class="config-title">工具</div>
                <div class="tools-list" id="toolsList">
                    <span class="tool-tag">🔍 搜索</span>
                    <span class="tool-tag">🌐 浏览器</span>
                    <span class="tool-tag">💻 终端</span>
                    <span class="tool-tag">📁 文件</span>
                </div>
            </div>
            
            <div class="config-section">
                <div class="config-title">系统提示词</div>
                <div class="prompt-area">
                    <textarea id="systemPrompt" placeholder="输入系统提示词...">你是一个专业的 AI 助手。</textarea>
                </div>
            </div>
            
            <div class="config-section">
                <div class="config-title">会话统计</div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">消息数</div>
                        <div class="stat-value" id="msgCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Token</div>
                        <div class="stat-value" id="tokenCount">0</div>
                    </div>
                </div>
            </div>
            
            <div class="config-section">
                <div class="config-title">API 设置</div>
                <div class="config-item">
                    <div class="config-label">API 地址</div>
                    <input type="text" class="config-input" id="apiUrl" placeholder="http://localhost:18789">
                </div>
                <div class="config-item">
                    <div class="config-label">API Token</div>
                    <input type="password" class="config-input" id="apiToken" placeholder="输入 Token">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 8px;" id="connectBtn">连接</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
