<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 实时监控看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --gradient-1: linear-gradient(135deg, #6366f1, #a855f7);
            --gradient-2: linear-gradient(135deg, #10b981, #059669);
            --gradient-3: linear-gradient(135deg, #f59e0b, #ef4444);
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .header .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }
        
        .refresh-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: var(--primary-light);
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .last-update {
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .stat-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }
        
        .stat-card .label {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .stat-card .value.success { color: var(--success); }
        .stat-card .value.warning { color: var(--warning); }
        .stat-card .value.danger { color: var(--danger); }
        
        .stat-card .detail {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 1200px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        /* Card */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }
        
        .card-body {
            padding: 16px 20px;
        }
        
        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.ok {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }
        
        .status-badge.running {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
        }
        
        .status-badge.warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }
        
        .status-badge.error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table td {
            padding: 12px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        .data-table .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        
        /* Channel List */
        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .channel-item:last-child {
            border-bottom: none;
        }
        
        .channel-name {
            font-weight: 500;
        }
        
        .channel-detail {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 2px;
        }
        
        /* Security Alerts */
        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .alert-item.critical {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .alert-item.warn {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        
        .alert-item.info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .alert-icon {
            font-size: 18px;
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 500;
            font-size: 13px;
        }
        
        .alert-desc {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Session List */
        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .session-item:last-child {
            border-bottom: none;
        }
        
        .session-key {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .session-model {
            font-size: 12px;
            color: var(--primary-light);
        }
        
        .session-tokens {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        
        /* Empty State */
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div>
                <h1>🦞 OpenClaw 监控看板</h1>
                <div class="subtitle">实时监控 AI 助手运行状态</div>
            </div>
            <div class="refresh-info">
                <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">🔄 刷新数据</button>
                <span class="last-update" id="lastUpdate">--</span>
            </div>
        </div>
        
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Gateway 状态</div>
                <div class="value success" id="gatewayStatus">--</div>
                <div class="detail" id="gatewayDetail">--</div>
            </div>
            <div class="stat-card">
                <div class="label">活跃会话</div>
                <div class="value" id="sessionCount">--</div>
                <div class="detail" id="sessionDetail">--</div>
            </div>
            <div class="stat-card">
                <div class="label">定时任务</div>
                <div class="value" id="cronCount">--</div>
                <div class="detail" id="cronDetail">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Token 使用</div>
                <div class="value" id="tokenUsage">--</div>
                <div class="detail" id="tokenDetail">--</div>
            </div>
        </div>
        
        <div class="grid">
            <!-- Cron Jobs -->
            <div class="card">
                <div class="card-header">
                    <h2>⏰ 定时任务</h2>
                    <span class="status-badge ok" id="cronStatusBadge">--</span>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>任务名称</th>
                                <th>调度</th>
                                <th>下次运行</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="cronTable">
                            <tr><td colspan="4" class="empty">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Channels -->
            <div class="card">
                <div class="card-header">
                    <h2>📱 渠道状态</h2>
                </div>
                <div class="card-body" id="channelList">
                    <div class="empty">加载中...</div>
                </div>
            </div>
            
            <!-- Recent Sessions -->
            <div class="card">
                <div class="card-header">
                    <h2>💬 最近会话</h2>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>会话</th>
                                <th>模型</th>
                                <th>Token</th>
                            </tr>
                        </thead>
                        <tbody id="sessionTable">
                            <tr><td colspan="3" class="empty">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Security -->
            <div class="card">
                <div class="card-header">
                    <h2>🔒 安全警告</h2>
                </div>
                <div class="card-body" id="securityList">
                    <div class="empty">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let refreshInterval = null;
        
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 刷新中...';
            
            try {
                // Fetch health data
                const healthRes = await fetch('/api/health');
                const healthText = await healthRes.text();
                
                // Fetch cron list
                const cronRes = await fetch('/api/cron');
                const cronData = await cronRes.json();
                
                // Parse health from text output (since it's plain text)
                parseAndRender(healthText, cronData);
                
                document.getElementById('lastUpdate').textContent = 
                    new Date().toLocaleTimeString('zh-CN');
            } catch (e) {
                console.error('Refresh failed:', e);
                // Fallback to polling from gateway
                try {
                    await refreshFromGateway();
                } catch (e2) {
                    console.error('Gateway fallback failed:', e2);
                }
            }
            
            btn.disabled = false;
            btn.textContent = '🔄 刷新数据';
        }
        
        async function refreshFromGateway() {
            // Use gateway API directly
            const [healthResp, cronResp] = await Promise.all([
                fetch('http://localhost:18789/api/health'),
                fetch('http://localhost:18789/api/cron')
            ]);
            
            const healthText = await healthResp.text();
            const cronData = await cronResp.json();
            
            parseAndRender(healthText, cronData);
            document.getElementById('lastUpdate').textContent = 
                new Date().toLocaleTimeString('zh-CN');
        }
        
        function parseAndRender(healthText, cronData) {
            // Parse health output
            const lines = healthText.split('\n');
            
            // Gateway status
            const gatewayLine = lines.find(l => l.includes('Gateway'));
            if (gatewayLine) {
                const reachMatch = gatewayLine.match(/reachable (\d+)ms/);
                if (reachMatch) {
                    document.getElementById('gatewayStatus').textContent = '在线';
                    document.getElementById('gatewayDetail').textContent = `响应 ${reachMatch[1]}ms`;
                }
            }
            
            // Sessions
            const sessionsLine = lines.find(l => l.includes('Sessions'));
            if (sessionsLine) {
                const match = sessionsLine.match(/(\d+) active/);
                if (match) {
                    document.getElementById('sessionCount').textContent = match[1];
                    const tokenMatch = sessionsLine.match(/(\d+)k\/(\d+)k/);
                    if (tokenMatch) {
                        document.getElementById('sessionDetail').textContent = 
                            `当前 ${tokenMatch[1]}k / ${tokenMatch[2]}k`;
                    }
                }
            }
            
            // Parse cron jobs
            if (cronData && cronData.jobs) {
                renderCronJobs(cronData.jobs);
            }
            
            // Channels
            renderChannels(healthText);
            
            // Sessions table
            renderSessions(healthText);
            
            // Security
            renderSecurity(healthText);
        }
        
        function renderCronJobs(jobs) {
            const tbody = document.getElementById('cronTable');
            const running = jobs.filter(j => j.status === 'running').length;
            const ok = jobs.filter(j => j.status === 'ok').length;
            
            document.getElementById('cronCount').textContent = `${jobs.length}`;
            document.getElementById('cronDetail').textContent = 
                `${running} 运行中, ${ok} 正常`;
            
            document.getElementById('cronStatusBadge').innerHTML = 
                `<span class="status-dot"></span> ${running + ok}/${jobs.length}`;
            
            tbody.innerHTML = jobs.slice(0, 8).map(job => `
                <tr>
                    <td>${job.name}</td>
                    <td class="mono">${job.schedule}</td>
                    <td class="mono">${job.next}</td>
                    <td>
                        <span class="status-badge ${job.status}">
                            <span class="status-dot"></span>
                            ${job.status === 'running' ? '运行中' : job.status}
                        </span>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderChannels(text) {
            const container = document.getElementById('channelList');
            const channelMatch = text.match(/Feishu\s+ON\s+(\w+)/);
            
            if (channelMatch) {
                const state = channelMatch[1];
                container.innerHTML = `
                    <div class="channel-item">
                        <div>
                            <div class="channel-name">📱 飞书</div>
                            <div class="channel-detail">2/2 账号配置</div>
                        </div>
                        <span class="status-badge ${state === 'OK' ? 'ok' : 'error'}">
                            <span class="status-dot"></span>
                            ${state}
                        </span>
                    </div>
                `;
            }
        }
        
        function renderSessions(text) {
            const tbody = document.getElementById('sessionTable');
            const sessionMatches = text.matchAll(/agent:main:cron:([a-f0-9-]+)\s+\|\s+direct\s+\|\s+(\w+)\s+\|\s+([a-z0-9-.]+)\s+\|\s+(\d+)k\/(\d+)k/g);
            
            const sessions = [];
            for (const match of sessionMatches) {
                sessions.push({
                    key: match[1].substring(0, 8),
                    age: match[2],
                    model: match[3],
                    used: match[4],
                    max: match[5]
                });
            }
            
            document.getElementById('tokenUsage').textContent = 
                sessions.length > 0 ? `${sessions[0].used}k` : '0';
            document.getElementById('tokenDetail').textContent = 
                sessions.length > 0 ? `/ ${sessions[0].max}k` : '';
            
            if (sessions.length > 0) {
                tbody.innerHTML = sessions.slice(0, 5).map(s => `
                    <tr>
                        <td class="mono">${s.key}...</td>
                        <td class="session-model">${s.model}</td>
                        <td class="session-tokens">${s.used}k/${s.max}k</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="3" class="empty">无活跃会话</td></tr>';
            }
        }
        
        function renderSecurity(text) {
            const container = document.getElementById('securityList');
            
            const criticalMatch = text.match(/(\d+) critical/);
            const warnMatch = text.match(/(\d+) warn/);
            
            let html = '';
            
            if (criticalMatch && parseInt(criticalMatch[1]) > 0) {
                html += `
                    <div class="alert-item critical">
                        <span class="alert-icon">🔴</span>
                        <div class="alert-content">
                            <div class="alert-title">严重安全问题</div>
                            <div class="alert-desc">Control UI 设备认证已禁用</div>
                        </div>
                    </div>
                `;
            }
            
            if (warnMatch && parseInt(warnMatch[1]) > 0) {
                html += `
                    <div class="alert-item warn">
                        <span class="alert-icon">⚠️</span>
                        <div class="alert-content">
                            <div class="alert-title">警告</div>
                            <div class="alert-desc">飞书文档创建可能授予权限</div>
                        </div>
                    </div>
                `;
            }
            
            if (!html) {
                html = '<div class="alert-item info"><span class="alert-icon">✅</span><div class="alert-content"><div class="alert-title">系统安全</div><div class="alert-desc">未发现安全问题</div></div></div>';
            }
            
            container.innerHTML = html;
        }
        
        // Auto refresh every 30 seconds
        function startAutoRefresh() {
            refreshData();
            refreshInterval = setInterval(refreshData, 30000);
        }
        
        // Initialize
        startAutoRefresh();
    </script>
</body>
</html>
