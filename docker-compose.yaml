version: '3.8'

services:
  openclaw-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-monitor:latest
    container_name: openclaw-monitor
    ports:
      - "8899:8899"
    environment:
      - PORT=8899
      - TZ=Asia/Shanghai
      # Docker模式：让容器通过docker exec调用宿主机上的OpenClaw
      - USE_DOCKER=true
      # OpenClaw容器名称（根据实际修改）
      - OPENCLAW_CONTAINER=OpenClaw
    volumes:
      # 挂载Docker socket，用于执行docker exec
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
