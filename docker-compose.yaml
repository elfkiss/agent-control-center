version: '3.8'

services:
  openclaw-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-monitor:latest
    container_name: openclaw-monitor
    ports:
      - "8899:8899"
    environment:
      - PORT=8899
      - TZ=Asia/Shanghai
      # OpenClaw 安装路径（根据实际修改）
      - OPENCLAW_PATH=/usr/local/bin/openclaw
    volumes:
      # 挂载 OpenClaw CLI 和 Docker socket
      - /usr/local/bin/openclaw:/usr/local/bin/openclaw:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
