version: '3.8'

services:
  openclaw-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-monitor:latest
    container_name: openclaw-monitor
    ports:
      - "8899:8899"
    environment:
      - PORT=8899
      - TZ=Asia/Shanghai
    volumes:
      # 挂载 OpenClaw 路径
      - /usr/local/bin/openclaw:/usr/local/bin/openclaw:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8899/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
