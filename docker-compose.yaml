version: '3.8'

services:
  agent-control-center:
    build: .
    image: agent-control:v0.1.3
    container_name: openclaw-agent-control-v0.1.3
    ports:
      - "8899:80"
    restart: unless-stopped
    environment:
      - API_URL=http://host.docker.internal:18789
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # OpenClaw Gateway (可选，需要宿主机运行)
